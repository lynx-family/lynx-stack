<html>
  <head>
    <meta charset="utf-8">
    <title>web playground</title>
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="default" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <meta content="portrait" name="screen-orientation">
    <meta
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
      name="viewport"
    >
    <meta content="portrait" name="x5-orientation">
    <link href="/main.css" rel="stylesheet">
    <style>
    x-view {
      width: 100%;
    }

    x-list {
      width: 100%;
      height: 100%;
    }

    .item {
      height: 100px;
      border-width: 2px;
      border-color: green;
      background-color: hsl(calc(20 * var(--item-index)), 100%, 70%);
    }
    </style>
  </head>

  <body>
    <script src="/main.js" defer></script>
    <!-- Make the document scrollable so `pageX/pageY` differs from `clientX/clientY`. -->
    <div style="height: 800px; background: #f5f5f5">spacer</div>

    <div style="width: 100vw; display: flex; flex-direction: row">
      <x-foldview-ng
        id="foldview"
        style="width: 80%; height: 400px; background-color: wheat; display: flex; flex-direction: column"
      >
        <x-foldview-header-ng
          style="position: absolute; width: 100%; height: 200px"
        >
          <div style="background-color: aqua; width: 100%; height: 300px"></div>
        </x-foldview-header-ng>
        <x-foldview-slot-ng style="width: 100%; height: 400px">
          <x-list id="inner-list" enable-scroll="true">
            <list-item class="item" style="--item-index: 0" item-key="0"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 1" item-key="1"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 2" item-key="2"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 3" item-key="3"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 4" item-key="4"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 5" item-key="5"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 6" item-key="6"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 7" item-key="7"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 8" item-key="8"><x-view
              ></x-view></list-item>
            <list-item class="item" style="--item-index: 9" item-key="9"><x-view
              ></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 10"
              item-key="10"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 11"
              item-key="11"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 12"
              item-key="12"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 13"
              item-key="13"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 14"
              item-key="14"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 15"
              item-key="15"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 16"
              item-key="16"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 17"
              item-key="17"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 18"
              item-key="18"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 19"
              item-key="19"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 20"
              item-key="20"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 21"
              item-key="21"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 22"
              item-key="22"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 23"
              item-key="23"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 24"
              item-key="24"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 25"
              item-key="25"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 26"
              item-key="26"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 27"
              item-key="27"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 28"
              item-key="28"
            ><x-view></x-view></list-item>
            <list-item
              class="item"
              style="--item-index: 29"
              item-key="29"
            ><x-view></x-view></list-item>
          </x-list>
        </x-foldview-slot-ng>
      </x-foldview-ng>
    </div>
  </body>
</html>
