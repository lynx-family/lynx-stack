<html>
  <head>
    <meta charset="utf-8">
    <title>web playground</title>
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="default" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <meta content="portrait" name="screen-orientation">
    <meta
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
      name="viewport"
    >
    <meta content="portrait" name="x5-orientation" />

    <link
      href="/main.css"
      rel="stylesheet"
    />
  </head>

  <body style="background-color: #f4f4f4">
    <script src="/main.js" defer></script>
    <x-view class="page" style="padding: 24px; gap: 16px">
      <x-input
        style="width: 220px; height: 64px; border: 6px solid #22577a; border-radius: 24px; background-color: #ffd166; color: #1d1d1d; font-size: 22px; padding: 0 24px"
        confirm-type="done"
        value="rounded"
      ></x-input>
      <x-input
        style="width: 220px; height: 64px; border: 6px solid #22577a; background-color: #ffd166; color: #1d1d1d; font-size: 22px; padding: 0 24px"
        confirm-type="done"
        value="square"
      ></x-input>
    </x-view>
  </body>
</html>
