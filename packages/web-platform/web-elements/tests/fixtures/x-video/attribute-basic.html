<html>
  <head>
    <meta charset="utf-8">
    <title>x-video attribute-basic</title>
    <link href="/main.css" rel="stylesheet" />
  </head>
  <body>
    <script src="/main.js" defer></script>
    <x-view class="page column">
      <x-video
        id="video"
        src="https://example.com/video.mp4"
        loop
        muted
        volume="0.5"
        speed="1.5"
        object-fit="cover"
      ></x-video>
    </x-view>
  </body>
</html>
