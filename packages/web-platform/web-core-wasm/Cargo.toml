[package]
name = "web-core-wasm"
version = "0.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
bincode = { version = "2.0.1", features = ["serde"] }
js-sys = { workspace = true }
lazy_static = { workspace = true }
serde.workspace = true
serde-wasm-bindgen = "0.6.5"
serde_json.workspace = true
wasm-bindgen = { workspace = true }
wasm-bindgen-derive = "0.3.0"
wasm-bindgen-futures = "0.4.55"
web-sys = { workspace = true, optional = true, features = ["CssStyleDeclaration", "CssRule", "CssRuleList", "HtmlElement", "Blob", "BlobPropertyBag", "Url", "HtmlTemplateElement", "HtmlStyleElement", "DocumentFragment", "Document", "Window", "Event", "Attr", "HtmlCollection", "NamedNodeMap", "DomTokenList", "NodeList", "CssStyleSheet", 'console'] }
[features]
default = ["web-sys"]
encode = []
