<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UI Judge Fixture</title>
    <style>
    :root {
      color-scheme: light;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #eef2f8;
      color: #172033;
    }

    main {
      width: min(340px, calc(100vw - 32px));
      padding: 20px;
      border: 1px solid #d2d9e8;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgb(21 34 64 / 14%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 16px;
      color: #536071;
      line-height: 1.5;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #1463ff;
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    dl {
      display: none;
      margin: 16px 0 0;
      padding: 16px;
      border-radius: 6px;
      background: #f6f8fc;
    }

    dl[data-visible="true"] {
      display: grid;
      gap: 8px;
    }

    dt {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #657185;
    }

    dd {
      margin: 0;
      font-weight: 700;
    }
    </style>
  </head>
  <body>
    <main aria-label="Order confirmation card">
      <h1>Order confirmed</h1>
      <p>
        The generated UI should show a confirmation card and reveal shipping
        details after interaction.
      </p>
      <button type="button" id="reveal">Reveal details</button>
      <dl id="details">
        <div>
          <dt>Status</dt>
          <dd>Paid</dd>
        </div>
        <div>
          <dt>Shipping</dt>
          <dd>Arrives Friday</dd>
        </div>
        <div>
          <dt>Viewport</dt>
          <dd id="viewport">unknown</dd>
        </div>
      </dl>
    </main>
    <script>
    const details = document.getElementById('details');
      const viewport = document.getElementById('viewport');
      const reveal = document.getElementById('reveal');

      viewport.textContent = `${window.innerWidth}x${window.innerHeight}`;
      reveal.addEventListener('click', () => {
        details.dataset.visible = 'true';
      });
    </script>
  </body>
</html>
