[package]
name = "lynx"
version = "0.1.0"
build = "build.rs"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
libloading = "0.9"
thiserror = "2"

[build-dependencies]
fs2 = "0.4"
reqwest = { version = "0.13.4", default-features = false, features = ["blocking", "rustls"] }
sha2 = { workspace = true }
tempfile = "3"
