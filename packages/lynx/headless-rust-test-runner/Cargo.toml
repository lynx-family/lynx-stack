[package]
name = "lynx-headless-rust-test-runner"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
lynx = { path = "../engine-bridge/lynx" }
png = "0.18.1"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = "2.0.19"
tokio = { workspace = true, features = ["fs", "io-util", "macros", "net", "rt", "sync", "time"] }
ureq = "2.12.1"
url = "2.5.8"

[[bin]]
name = "lynx-headless-rust-test-runner"
path = "src/main.rs"
