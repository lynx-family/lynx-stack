name: Deploy

on:
  push:
    branches: [
      "main",
      "release/*",
    ]

# Set default minimum permissions to prevent unnecessary access
permissions: {}

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1
  GITHUB_BASE_REF: ${{ github.base_ref }}
  GITHUB_HEAD_REF: ${{ github.head_ref }}
  GITHUB_REF: ${{ github.ref }}
  NPM_CONFIG_PROVENANCE: true
jobs:
  build:
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    if: github.repository == 'lynx-family/lynx-stack'
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1
        with:
          cache: false
      - name: Install
        uses: ./.github/actions/pnpm-install
        with:
          node-version: "24"
          save-if: ${{ github.ref_name == 'main' }}
      - name: build
        run: |
          corepack pnpm turbo --filter !benchx_cli --filter "!@lynx-js/benchmark-*" build --summarize
      - name: Save Turbo Result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-${{ github.sha }}
          path: .turbo
          if-no-files-found: error
          retention-days: 1
          overwrite: true
          include-hidden-files: true
  # We make a build here to make sure cache works for pull requests
  # See: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows#restrictions-for-accessing-a-cache
  build-all:
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - label: lynx-ubuntu-26.04-xlarge
            name: Ubuntu
          - label: lynx-windows-2022-large
            name: Windows
    name: Build (${{ matrix.runs-on.name }})
    uses: ./.github/workflows/workflow-build.yml
    if: github.repository == 'lynx-family/lynx-stack'
    permissions: {}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      runs-on: ${{ matrix.runs-on.label }}
      runs-on-name: ${{ matrix.runs-on.name }}
  benchmark:
    needs: build-all
    uses: ./.github/workflows/workflow-bench.yml
    permissions: {}
    secrets:
      ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ENDPOINT: ${{ secrets.ENDPOINT }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      REGION: ${{ secrets.REGION }}
  bundle-analysis:
    permissions: {}
    needs: build-all
    uses: ./.github/workflows/workflow-bundle-analysis.yml
    if: github.repository == 'lynx-family/lynx-stack'
  coverage:
    needs: build-all
    uses: ./.github/workflows/workflow-test.yml
    if: github.repository == 'lynx-family/lynx-stack'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      runs-on: lynx-ubuntu-26.04-medium
      run: >
        pnpm run test
        --testTimeout=50000
        --hookTimeout=50000
        --reporter=dot
        --reporter=junit
        --outputFile=test-report.junit.xml
        --coverage
        --no-cache
        --logHeapUsage
        --silent
  coverage-web-elements:
    needs: build-all
    uses: ./.github/workflows/workflow-test.yml
    if: github.repository == 'lynx-family/lynx-stack'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      runs-on: lynx-custom-container
      is-web: true
      run: |
        echo "open files limit before: soft=$(ulimit -Sn), hard=$(ulimit -Hn)"
        ulimit -Sn "$(ulimit -Hn)"
        echo "open files limit after: soft=$(ulimit -Sn), hard=$(ulimit -Hn)"
        export NODE_OPTIONS="--max-old-space-size=32768"
        export PLAYWRIGHT_JUNIT_OUTPUT_NAME=test-report.junit.xml
        pnpm --filter @lynx-js/web-elements run test --reporter='github,dot,junit,html'
        pnpm --filter @lynx-js/web-elements run coverage:ci
  coverage-web-core:
    needs: build-all
    uses: ./.github/workflows/workflow-test.yml
    if: github.repository == 'lynx-family/lynx-stack'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      runs-on: lynx-custom-container
      is-web: true
      run: |
        echo "open files limit before: soft=$(ulimit -Sn), hard=$(ulimit -Hn)"
        ulimit -Sn "$(ulimit -Hn)"
        echo "open files limit after: soft=$(ulimit -Sn), hard=$(ulimit -Hn)"
        export NODE_OPTIONS="--max-old-space-size=32768"
        export PLAYWRIGHT_JUNIT_OUTPUT_NAME=test-report.junit.xml
        pnpm --filter @lynx-js/web-core-e2e run test --reporter='github,dot,junit,html'
        pnpm --filter @lynx-js/web-core-e2e run coverage:ci
  publish:
    timeout-minutes: 30
    needs: build
    runs-on: ubuntu-26.04
    if: github.repository == 'lynx-family/lynx-stack'
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.ref }}
      cancel-in-progress: false
    environment: npm
    permissions:
      contents: write
      pull-requests: write
      statuses: read
      # `id-token: write` is required for npm provenance
      # See: https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install
        uses: ./.github/actions/pnpm-install
        with:
          node-version: "24"
          save-if: ${{ github.ref_name == 'main' }}
      - name: Download Turbo Cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        timeout-minutes: 5
        with:
          name: deploy-${{ github.sha }}
          path: .turbo
      - name: build
        run: |
          corepack pnpm turbo build --filter !benchx_cli --filter "!@lynx-js/benchmark-*" --summarize
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date -u +'%Y-%m-%d %H:%M:%S')"
      - name: attempt to release
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: pnpm changeset publish
          title: "chore: Release ${{ steps.date.outputs.date }}"

  canary-publish:
    timeout-minutes: 30
    needs: build
    runs-on: ubuntu-26.04
    if: github.repository == 'lynx-family/lynx-stack'
    environment: npm
    permissions:
      contents: read
      pull-requests: read
      statuses: read
      # `id-token: write` is required for npm provenance
      # See: https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install
        uses: ./.github/actions/pnpm-install
        with:
          node-version: "24"
          save-if: ${{ github.ref_name == 'main' }}
      - name: Download Turbo Cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        timeout-minutes: 5
        with:
          name: deploy-${{ github.sha }}
          path: .turbo
      - name: build
        run: |
          corepack pnpm turbo --filter !benchx_cli --filter "!@lynx-js/benchmark-*" build --summarize
      - name: version canary packages
        env:
          # changesets-changelog-github requires a GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm changeset version --snapshot canary
          node packages/tools/canary-release/snapshot.js
      - name: publish canary packages
        run: |
          pnpm --recursive publish --no-git-checks --access public
  website-build:
    needs: build-all
    if: github.repository == 'lynx-family/lynx-stack'
    uses: ./.github/workflows/workflow-website.yml
    permissions: {}
  website-deploy:
    timeout-minutes: 10
    needs: website-build
    if: github.repository == 'lynx-family/lynx-stack'
    runs-on: ubuntu-26.04
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
      contents: read

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
