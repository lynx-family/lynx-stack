name: Benchmark
on:
  workflow_call:
    secrets:
      ACCESS_KEY:
        required: false
      SECRET_KEY:
        required: false
      ENDPOINT:
        required: false
      BUCKET_NAME:
        required: false
      REGION:
        required: false

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1
jobs:
  nodejs-benchmark:
    permissions: {}
    timeout-minutes: 45
    # CodSpeed does not support merge_group event.
    # add a comment
    #
    # Error: Event merge_group is not supported by CodSpeed
    # Error: unknown variant `merge_group`, expected one of `push`, `pull_request`, `workflow_dispatch`, `schedule`, `local` at line 1 column 13
    if: github.event_name != 'merge_group'
    runs-on: physical-exclusive
    env:
      ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ENDPOINT: ${{ secrets.ENDPOINT }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      REGION: ${{ secrets.REGION }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install
        uses: ./.github/actions/pnpm-install
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Setup Rust
        shell: bash
        run: |
          # The physical-exclusive runner doesn't propagate $HOME between
          # steps, so the reusable ./.github/actions/rustup action writes
          # an empty cargo bin path into $GITHUB_PATH. Install rustup
          # inline with an explicit HOME and pin /root/.cargo/bin on PATH.
          export HOME=/root
          if ! command -v /root/.cargo/bin/cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL https://sh.rustup.rs \
              | sh -s -- --default-toolchain none -y
          fi
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="/root/.cargo/bin:$PATH"
          # Pre-install the toolchain pinned by rust-toolchain.toml plus
          # the wasm targets web-core needs. Doing it once here keeps the
          # parallel cargo invocations from `pnpm turbo build` from racing
          # on /root/.rustup/downloads while each tries to sync the channel
          # just-in-time.
          toolchain="$(grep -E '^\s*channel\s*=' rust-toolchain.toml | head -n1 | sed -E 's/.*=\s*"([^"]+)".*/\1/')"
          rustup toolchain install "$toolchain" --profile default
          rustup target add --toolchain "$toolchain" wasm32-unknown-unknown wasm32-wasip1
      - name: TurboCache
        # The physical-exclusive runner has no baked-in OSS credentials, so the
        # cache action needs them forwarded as secrets. Callers that can't
        # provide them (deploy-main's benchmark job, fork pull requests where
        # GitHub withholds secrets) leave these empty; skip the cache then and
        # let `pnpm turbo build` rebuild locally instead of hard-failing.
        if: ${{ env.ACCESS_KEY != '' && env.SECRET_KEY != '' && env.ENDPOINT != '' && env.BUCKET_NAME != '' && env.REGION != '' }}
        uses: lynx-infra/cache@5c6160a6a4c7fca80a2f3057bb9dfc9513fcb732
        with:
          path: .turbo
          # The build job runs on lynx-ubuntu-24.04-xlarge which writes to a
          # different OSS bucket than this physical-exclusive runner, so we
          # tolerate cache misses and let `pnpm turbo build` rebuild locally.
          key: turbo-v4-${{ runner.os }}-${{ hashFiles('**/packages/**/src/**/*.rs') }}-${{ github.sha }}
      - name: Build
        run: |
          pnpm turbo build
      - name: Prepare CodSpeed
        run: |
          curl -fsSL https://github.com/CodSpeedHQ/codspeed/releases/download/v4.17.5/codspeed-runner-installer.sh | bash -s -- --quiet
      - name: Run benchmark (simulation)
        env:
          # CodSpeed's simulation mode runs benchmarks under Valgrind/Callgrind.
          # The codspeed runner creates its profile folder under the system temp
          # dir (Rust env::temp_dir(), i.e. $TMPDIR) and writes the raw callgrind
          # output (<pid>.out) plus valgrind logs there. Pin TMPDIR to a
          # dedicated directory so that raw profile can be collected as an
          # artifact below.
          TMPDIR: ${{ runner.temp }}/codspeed-valgrind-tmp
        run: |
          export HOME=/root
          . "$HOME/.cargo/env"
          mkdir -p "$TMPDIR"
          codspeed run --mode simulation -- pnpm -r run --workspace-concurrency=1 bench
      - name: Prepare Valgrind profile manifest
        # Runs on every benchmark run, not just failures: the raw callgrind
        # profile captured here is what we diff against main's run when a
        # regression shows up on CodSpeed.
        if: ${{ always() }}
        run: |
          mkdir -p "${RUNNER_TEMP}/codspeed-valgrind-tmp"
          {
            echo "TMPDIR=${RUNNER_TEMP}/codspeed-valgrind-tmp"
            echo
            find "${RUNNER_TEMP}/codspeed-valgrind-tmp" -mindepth 1 -maxdepth 2 -printf '%M %s %p\n' | sort
          } > "${RUNNER_TEMP}/codspeed-valgrind-tmp/MANIFEST.txt"
      - name: Upload Valgrind profile
        # Uploaded on every run (including green) on purpose: the raw callgrind
        # profile is kept so a later regression can be diffed against main's
        # profile. include-hidden-files keeps the dotfiles.
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codspeed-valgrind-tmp-${{ github.sha }}
          path: ${{ runner.temp }}/codspeed-valgrind-tmp
          include-hidden-files: true
          overwrite: true
      - name: Run benchmark (walltime)
        run: |
          export HOME=/root
          . "$HOME/.cargo/env"
          taskset -c 176-191 codspeed run --mode walltime -- pnpm -r run --workspace-concurrency=1 bench
      - name: React benchmark - Run perfetto
        run: |
          pnpm -r run --workspace-concurrency=1 perfetto
      - name: React benchmark - Upload perfetto output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-react-ptrace-${{ github.sha }}
          path: ./benchmark/react/dist/*.ptrace
