name: Temporary pkg.pr.new Preview

on:
  push:
    branches:
      - codex/fix-external-bundle-public-path
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  publish:
    if: github.repository == 'ScriptedAlchemy/lynx-stack'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          npm install -g corepack@latest
          corepack enable

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal --target wasm32-unknown-unknown --target wasm32-wasip1

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-pkg-pr-new-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            cargo-pkg-pr-new-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build preview packages
        run: |
          pnpm turbo build --filter=@lynx-js/react --filter=@lynx-js/rspeedy --filter=@lynx-js/react-rsbuild-plugin --filter=@lynx-js/web-core

      - name: Publish preview packages
        run: |
          pnpm dlx pkg-pr-new publish --compact --pnpm --comment=off --commentWithSha \
            packages/react \
            packages/react-umd \
            packages/rspeedy/core \
            packages/rspeedy/create-rspeedy \
            packages/rspeedy/lynx-bundle-rslib-config \
            packages/rspeedy/plugin-react \
            packages/rspeedy/plugin-react-alias \
            packages/rspeedy/upgrade-rspeedy \
            packages/web-platform/web-core \
            packages/web-platform/web-rsbuild-server-middleware \
            packages/web-platform/web-worker-rpc \
            packages/webpack/template-webpack-plugin
