name: Pkg.pr.new

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

# Set default minimum permissions to prevent unnecessary access
permissions: {}

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to pkg.pr.new
    timeout-minutes: 30
    runs-on: lynx-ubuntu-24.04-xlarge
    if: github.repository == 'lynx-family/lynx-stack'
    permissions:
      contents: read
      pull-requests: write
      # `id-token: write` is required for the pkg.pr.new OIDC verification
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rustup
        with:
          key: pkg-pr-new
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Collect packages with changesets
        id: changeset
        run: |
          pnpm changeset status --since=origin/main --output .changeset-status.json
          PACKAGE_DIRS=$(node .github/scripts/list-changeset-packages.cjs .changeset-status.json | tr '\n' ' ')
          if [ -z "$(echo "$PACKAGE_DIRS" | tr -d '[:space:]')" ]; then
            echo "No publishable packages affected by changesets; skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Publishing the following package directories to pkg.pr.new:"
          printf '  %s\n' $PACKAGE_DIRS
          {
            echo "skip=false"
            echo "package-dirs<<EOF"
            echo "$PACKAGE_DIRS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build
        if: steps.changeset.outputs.skip != 'true'
        # We build via pnpm rather than turbo here because turbo's pnpm-lock
        # parser can't read this repo's patched-dependency block, which makes
        # turbo's `--filter` fail. The exclusions mirror canary-publish; skipping
        # the heavyweight e2e/test bundles also avoids OOMing the runner.
        run: |
          pnpm \
            --filter '!@lynx-js/web-tests' \
            --filter '!@lynx-js/web-core-e2e' \
            --filter '!@lynx-js/benchmark-*' \
            --filter '!benchx_cli' \
            --recursive run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - name: Publish to pkg.pr.new
        if: steps.changeset.outputs.skip != 'true'
        env:
          PACKAGE_DIRS: ${{ steps.changeset.outputs.package-dirs }}
        run: pnpm dlx pkg-pr-new publish --compact --pnpm $PACKAGE_DIRS
