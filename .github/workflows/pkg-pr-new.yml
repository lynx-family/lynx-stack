name: Pkg.pr.new

# Triggered after the `Test` workflow finishes on a PR. We piggy-back on its
# build artifacts via the TurboCache so we don't redo the monorepo build.
on:
  # zizmor: ignore[dangerous-triggers] workflow_run is the documented integration for pkg.pr.new. The job runs without `secrets:` and only holds a short-lived OIDC token scoped to pkg.pr.new — no production credentials, no `pull-requests: write`.
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions: {}

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to pkg.pr.new
    runs-on: lynx-ubuntu-24.04-medium
    timeout-minutes: 15
    # Skip fork PRs: workflow_run would otherwise execute fork-controlled
    # install/build scripts while holding an `id-token: write` OIDC token that
    # could publish malicious previews to pkg.pr.new under our repo identity.
    # Same-repo PRs are already trusted via branch protection.
    if: >
      github.repository == 'lynx-family/lynx-stack' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: read
      actions: read
      # required for the pkg.pr.new OIDC verification
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # workflow_run runs in the default-branch context, so we need to
          # explicitly check out the PR head.
          ref: ${{ github.event.workflow_run.head_sha }}
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false
      - name: TurboCache
        uses: lynx-infra/cache@5c6160a6a4c7fca80a2f3057bb9dfc9513fcb732
        with:
          path: .turbo
          # workflow-build.yml writes its primary key with the pull_request
          # merge-commit SHA (`github.sha` in a PR context), which is not
          # exposed inside a workflow_run event. Use a value we *do* have here
          # as the primary key for hit reporting and rely on the prefix
          # restore-keys to actually find the producer's cache — turbo's cache
          # entries are content-addressed, so any matching prefix is enough.
          key: turbo-v4-${{ runner.os }}-${{ hashFiles('**/packages/**/src/**/*.rs') }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-v4-${{ runner.os }}-${{ hashFiles('**/packages/**/src/**/*.rs') }}-
            turbo-v4-${{ runner.os }}-
      - name: Install
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Build
        # Cache-hit path is a no-op; the OOM mitigations below only matter when
        # we fall back to a fresh build (e.g. completely cold cache).
        run: pnpm turbo build --summarize --concurrency=4
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - name: Collect packages with changesets
        id: changeset
        run: |
          pnpm changeset status --since=origin/main --output .changeset-status.json
          PACKAGE_DIRS=$(node .github/scripts/list-changeset-packages.cjs .changeset-status.json | tr '\n' ' ')
          if [ -z "$(echo "$PACKAGE_DIRS" | tr -d '[:space:]')" ]; then
            echo "No publishable packages affected by changesets; skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Publishing the following package directories to pkg.pr.new:"
          printf '  %s\n' $PACKAGE_DIRS
          {
            echo "skip=false"
            echo "package-dirs<<EOF"
            echo "$PACKAGE_DIRS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Publish to pkg.pr.new
        if: steps.changeset.outputs.skip != 'true'
        env:
          PACKAGE_DIRS: ${{ steps.changeset.outputs.package-dirs }}
        run: pnpm dlx pkg-pr-new publish --compact --pnpm $PACKAGE_DIRS
