name: RelativeCI

on:
  # zizmor: ignore[dangerous-triggers] This is a dangerous trigger, but it's ok because we're not using it to trigger other workflows
  # See: https://relative-ci.com/documentation/setup/agent/github-action/#workflow_run-event
  workflow_run:
    workflows: ["Bundle Analysis", "Deploy", "Test"]
    types:
      - completed

permissions: {}

jobs:
  upload:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project:
          - path: ./examples/react
            name: example-react
            key: RELATIVE_CI_PROJECT_EXAMPLES_REACT_KEY
          - path: ./examples/react-element-template
            name: example-react-element-template
            key: RELATIVE_CI_PROJECT_EXAMPLES_REACT_ELEMENT_TEMPLATE_KEY
          - path: ./examples/react-main-thread-function
            name: example-react-main-thread-function
            key: RELATIVE_CI_PROJECT_EXAMPLES_REACT_MAIN_THREAD_FUNCTION_KEY
          - path: ./examples/react-externals
            name: example-react-externals
            key: RELATIVE_CI_PROJECT_EXAMPLES_REACT_EXTERNALS_KEY
          - path: ./packages/web-platform/web-explorer
            name: web-explorer
            key: RELATIVE_CI_PROJECT_WEB_EXPLORER_KEY
          - path: ./packages/rspeedy/core
            name: rspeedy
            key: RELATIVE_CI_PROJECT_RSPEEDY_CORE_KEY
    runs-on: lynx-ubuntu-24.04-medium
    name: Upload ${{ matrix.project.name }}
    env:
      RELATIVE_CI_PROJECT_EXAMPLES_REACT_KEY: ${{ secrets.RELATIVE_CI_PROJECT_EXAMPLES_REACT_KEY }}
      RELATIVE_CI_PROJECT_EXAMPLES_REACT_ELEMENT_TEMPLATE_KEY: ${{ secrets.RELATIVE_CI_PROJECT_EXAMPLES_REACT_ELEMENT_TEMPLATE_KEY }}
      RELATIVE_CI_PROJECT_EXAMPLES_REACT_MAIN_THREAD_FUNCTION_KEY: ${{ secrets.RELATIVE_CI_PROJECT_EXAMPLES_REACT_MAIN_THREAD_FUNCTION_KEY }}
      RELATIVE_CI_PROJECT_EXAMPLES_REACT_EXTERNALS_KEY: ${{ secrets.RELATIVE_CI_PROJECT_EXAMPLES_REACT_EXTERNALS_KEY }}
      RELATIVE_CI_PROJECT_WEB_EXPLORER_KEY: ${{ secrets.RELATIVE_CI_PROJECT_WEB_EXPLORER_KEY }}
      RELATIVE_CI_PROJECT_RSPEEDY_CORE_KEY: ${{ secrets.RELATIVE_CI_PROJECT_RSPEEDY_CORE_KEY }}
    steps:
      - name: Send bundle stats and build information to RelativeCI - ${{ matrix.project.name }}
        uses: relative-ci/agent-action@fcf45416581928e8dd62eded78ce98c78e5149f8 # v3
        with:
          artifactName: ${{ matrix.project.name }}-relative-ci-artifacts
          key: ${{ env[matrix.project.key] }}
          token: ${{ secrets.GITHUB_TOKEN }}
