name: Website

on:
  workflow_call:

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1
jobs:
  build:
    permissions: {}
    runs-on: lynx-ubuntu-26.04-medium
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: TurboCache
        uses: lynx-infra/cache@5c6160a6a4c7fca80a2f3057bb9dfc9513fcb732
        with:
          path: .turbo
          key: turbo-v4-${{ runner.os }}-${{ hashFiles('packages/**/src/**/*.rs') }}-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Install
        uses: ./.github/actions/pnpm-install
        with:
          node-version: "24"
          save-if: ${{ github.ref_name == 'main' }}
      - name: Build
        run: |
          pnpm turbo --filter website build:docs
      - name: Build REPL
        run: |
          BASE_PATH='${{ steps.pages.outputs.base_path }}'
          export ASSET_PREFIX="${BASE_PATH%/}/repl/"
          pnpm --filter @lynx-js/repl build
      - name: Copy REPL into website output
        run: |
          rm -rf website/doc_build/repl
          mkdir -p website/doc_build
          cp -r packages/repl/dist website/doc_build/repl
      - name: Build GenUI Playground dependencies
        run: |
          pnpm turbo --filter genui-playground^... build
      - name: Build GenUI Playground Lynx bundle
        run: |
          pnpm --filter genui-playground build:lynx
      - name: Build GenUI Playground
        run: |
          BASE_PATH='${{ steps.pages.outputs.base_path }}'
          export ASSET_PREFIX="${BASE_PATH%/}/genui/"
          pnpm --filter genui-playground build
      - name: Copy GenUI Playground into website output
        run: |
          rm -rf website/doc_build/genui website/doc_build/zh/genui
          mkdir -p website/doc_build/zh
          cp -r packages/genui/playground/dist website/doc_build/genui
          cp -r packages/genui/playground/dist website/doc_build/zh/genui
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/doc_build
