name: UI Judge PR
on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/actions/comment-ui-judge-result/**"
      - ".github/scripts/*ui-judge*.mjs"
      - ".github/workflows/ui-judge-pr*.yml"
      - "packages/genui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

env:
  CI: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  judge:
    runs-on: lynx-custom-container
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      env:
        CI: 1
        TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install
        run: |
          npm install -g corepack@latest
          corepack enable
          pnpm install --frozen-lockfile
      - name: Build UI Judge
        run: pnpm --filter @lynx-js/ui-judge run build
      - name: Run UI Judge
        id: judge
        continue-on-error: true
        env:
          MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
          MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
          MIDSCENE_MODEL_FAMILY: ${{ secrets.MIDSCENE_MODEL_FAMILY }}
          MIDSCENE_MODEL_NAME: ${{ secrets.MIDSCENE_MODEL_NAME }}
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-report.junit.xml
          UI_JUDGE_RESULT_PATH: ${{ github.workspace }}/packages/genui/ui-judge/test-results/ui-judge-result.json
        run: pnpm --filter @lynx-js/ui-judge run test --reporter='github,dot,junit,html'
      - name: Ensure UI Judge result
        if: ${{ always() }}
        env:
          MIDSCENE_MODEL_NAME: ${{ secrets.MIDSCENE_MODEL_NAME }}
          UI_JUDGE_RESULT_PATH: ${{ github.workspace }}/packages/genui/ui-judge/test-results/ui-judge-result.json
          UI_JUDGE_STEP_OUTCOME: ${{ steps.judge.outcome }}
        run: node .github/scripts/ensure-ui-judge-result.mjs
      - name: Upload UI Judge result
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-judge-result
          path: packages/genui/ui-judge/test-results/ui-judge-result.json
          if-no-files-found: error
          retention-days: 7
      - name: Upload UI Judge report
        if: ${{ always() && steps.judge.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-judge-playwright-report
          path: packages/genui/ui-judge/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail when UI Judge failed
        if: ${{ steps.judge.outcome == 'failure' }}
        run: exit 1
