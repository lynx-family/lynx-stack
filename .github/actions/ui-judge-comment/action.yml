name: UI Judge Comment
description: Create or update a pull request comment from a UI Judge markdown report.
inputs:
  body-file:
    description: Path to the markdown body generated by Rust UI Judge.
    required: true
  github-token:
    description: GitHub token used to create or update the PR comment.
    required: false
    default: ${{ github.token }}
  marker:
    description: Stable hidden marker used to find an existing comment.
    required: false
    default: "<!-- ui-judge-comment -->"
  pr-number:
    description: Pull request number. Defaults to the pull_request event number.
    required: false
  update-existing:
    description: Update an existing marked comment instead of creating a new one.
    required: false
    default: "true"
outputs:
  comment-id:
    description: Created or updated comment id.
  comment-url:
    description: Created or updated comment URL.
runs:
  using: node20
  main: comment.mjs
