name: Comment UI Judge Result
description: Create or update the UI Judge result comment on a pull request.
inputs:
  github-token:
    description: GitHub token with permission to comment on pull requests.
    required: true
  head-sha:
    description: Pull request head commit SHA.
    required: true
  pr-number:
    description: Pull request number.
    required: true
  result-path:
    description: Path to the downloaded UI Judge JSON result.
    required: true
  workflow-conclusion:
    description: Conclusion of the UI Judge workflow run.
    required: true
  workflow-run-url:
    description: URL of the UI Judge workflow run.
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        UI_JUDGE_HEAD_SHA: ${{ inputs.head-sha }}
        UI_JUDGE_PR_NUMBER: ${{ inputs.pr-number }}
        UI_JUDGE_RESULT_PATH: ${{ inputs.result-path }}
        UI_JUDGE_WORKFLOW_CONCLUSION: ${{ inputs.workflow-conclusion }}
        UI_JUDGE_WORKFLOW_RUN_URL: ${{ inputs.workflow-run-url }}
      run: node "$GITHUB_ACTION_PATH/../../scripts/comment-ui-judge-result.mjs"
