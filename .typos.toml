# https://github.com/crate-ci/typos
# cargo install typos-cli
# typos

[files]
extend-exclude = [
  "**/*.{css,snap,txt}",
  "**/CHANGELOG.md",
  "pnpm-lock.yaml",
  "biome.jsonc",
  "packages/web-platform/web-explorer/preinstalled/homepage.json",
]

[default]
extend-ignore-re = [
  "(?Rm)^.*(#|//)\\s*spellchecker:disable-line$",
  "(?s)(#|//)\\s*spellchecker:off.*?\\n\\s*(#|//)\\s*spellchecker:on",
]

[default.extend-words]
# `cachable` is the option name on `@rspack/test-tools`' NodeRunner (their
# spelling); the vendored hot runner must pass it verbatim.
cachable = "cachable"
childs = "childs"
styl = "styl"
aci = "aci"
nd = "nd"
bui = "bui"
ba = "ba"
alog = "alog"
# Yarn Plug'n'Play
Pn = "Pn"
