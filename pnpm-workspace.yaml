packages:
  - benchmark/react
  - examples/*
  - packages/background-only
  - packages/genui
  - packages/genui/*
  - packages/i18n/*
  - packages/lynx/*
  - packages/mcp-servers/*
  - packages/repl
  - packages/react
  - packages/react/refresh
  - packages/react/runtime
  - packages/react/testing-library
  - packages/react/transform
  - packages/react/transform/rspack-napi
  - packages/react/transform/swc-plugin-reactlynx
  - packages/react/transform/swc-plugin-reactlynx-compat
  - packages/react-umd
  - packages/rspeedy/*
  - packages/tailwind-preset
  - packages/testing-library/*
  - packages/testing-library/examples/*
  - packages/motion
  - packages/tools/*
  - packages/use-sync-external-store
  - packages/web-platform/*
  - packages/webpack/*
  - website

# From `@pnpm/plugin-better-defaults`
enablePrePostScripts: false
engineStrict: true
hoistWorkspacePackages: true
ignorePatchFailures: false
optimisticRepeatInstall: true
publicHoistPattern: []
resolutionMode: "lowest-direct"
strictPeerDependencies: true

# Match Renovate's npm minimum release age; pnpm also guards lockfile maintenance.
minimumReleaseAge: 4320
# First-party `@lynx-js/*` packages (e.g. the dated-snapshot `@lynx-js/internal-preact`
# and `@lynx-js/preact-devtools` builds) are trusted and publish fresh releases that
# would otherwise be blocked by `minimumReleaseAge`.
minimumReleaseAgeExclude:
  - "@lynx-js/*"
  # typia-rspack-plugin uses trusted publish + staged publish
  - "typia-rspack-plugin"
  # First-party Rspack/Rsbuild toolchain — trusted, upgraded deliberately.
  - "@rspack/*"
  - "@rsbuild/*"
  - "@rstest/*"
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
# npm's abbreviated metadata omits the `time` field, so a strict check hard-fails
# (`ERR_PNPM_MISSING_TIME`) on packages it cannot date — e.g. during
# `pnpm dedupe --check`. Run non-strict so the age check is enforced when `time`
# is available and skipped (with a warning) when it is not.
minimumReleaseAgeStrict: false

# Caps pnpm's concurrent registry fetches. Fewer in-flight packuments means a
# lower peak: measured 2.56 -> 2.26 GB, which is what keeps the Renovate job
# under Mend's 3 GB limit. Slower on a cold metadata cache, free on a warm one.
networkConcurrency: 4

peerDependencyRules:
  allowedVersions:
    "@lynx-js/lynx-ui>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-button>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-checkbox>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-common>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-dialog>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-draggable>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-feed-list>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-form>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-input>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-lazy-component>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-list>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-overlay>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-popover>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-presence>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-radio-group>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-scroll-view>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-sheet>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-slider>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-sortable>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-swipe-action>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-swiper>@types/react": "^19.2.0"
    "@lynx-js/lynx-ui-switch>@types/react": "^19.2.0"
    "@standard-community/standard-json>quansync": "^0.2.10 || ^0.2.11"
    "@types/react-dom>@types/react": "^18 || ^19.2.0"
    "rsbuild-plugin-tailwindcss>tailwindcss": "^3 || ^4"

# Default catalogs
catalog:
  "@microsoft/api-extractor": "7.58.2"

catalogs:
  adb:
    "@yume-chan/adb": ^2.5.1
    "@yume-chan/adb-scrcpy": ^2.3.2
    "@yume-chan/adb-server-node-tcp": ^2.5.2
    "@yume-chan/async": ^2.1.0
    "@yume-chan/fetch-scrcpy-server": ^1.0.0
    "@yume-chan/scrcpy": ^2.3.0
    "@yume-chan/scrcpy-decoder-webcodecs": ^2.5.0
    "@yume-chan/stream-extra": ^2.1.0
    "@yume-chan/struct": ^2.1.0

  # Rsbuild monorepo packages
  rsbuild:
    "@rsbuild/core": "2.1.4"

  # Rslib monorepo packages
  rslib:
    "@rslib/core": "0.23.2"

  # Rspack monorepo packages
  rspack:
    "@rspack/cli": "2.1.3"
    "@rspack/core": "2.1.3"
    "@rspack/dev-server": "2.1.0"
    "@rspack/test-tools": "2.1.3"

  # Rstest monorepo packages
  rstest:
    "@rstest/adapter-rsbuild": "0.11.0"
    "@rstest/coverage-istanbul": "0.11.0"
    "@rstest/core": "0.11.2"

overrides:
  # Published @lynx-js/lynx-ui-* (pulled in by packages/genui/a2ui) peer-depend on
  # @lynx-js/react@^0.121.0 and would otherwise drag a published @lynx-js/react copy
  # into the workspace alongside the workspace one. Two copies = two snapshotManager
  # singletons, which breaks ReactLynx snapshot registration ("BackgroundSnapshot not
  # found"). Force every @lynx-js/react to the single workspace copy.
  "@lynx-js/react": "workspace:*"
  "@rspack/core": "$@rspack/core"
  "@rsbuild/core>@rspack/core": "$@rspack/core"
  "@rsdoctor/rspack-plugin>@rspack/core": "$@rspack/core"
  "@rsdoctor/types>@rspack/core": "$@rspack/core"

packageExtensions:
  "@rspack/test-tools@*":
    dependencies:
      wast-loader: ^1.14.1

patchedDependencies:
  "@napi-rs/cli@2.18.4": "patches/@napi-rs__cli@2.18.4.patch"
  "@rollup/plugin-typescript": "patches/@rollup__plugin-typescript.patch"

strictDepBuilds: true

allowBuilds:
  "@biomejs/biome": false
  "@parcel/watcher": false
  "@swc/core": false
  core-js: false
  dprint: true
  esbuild: true
  sharp: true
  unrs-resolver: false
